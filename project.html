<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Mes Projets - Shimel</title>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
      margin: 0;
      padding-top: 80px;
    }

    h1 {
      margin-bottom: 30px;
    }

    /* NAVBAR */
    nav {
      position: fixed;
      top: 0;
      width: 100%;
      background: #000;
      padding: 15px 0;
      text-align: center;
      z-index: 1000;
    }

    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    nav a:hover {
      color: #00bcd4;
    }

    /* PROJETS */
    .projects-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }

    .project-card {
      background: #1e1e1e;
      width: 260px;
      margin: 15px;
      padding: 15px;
      border-radius: 12px;
      transition: 0.3s;
      box-shadow: 0 4px 8px rgba(0,0,0,0.4);
    }

    .project-card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 10px;
    }

    .project-card h3 {
      margin: 10px 0;
      color: #00bcd4;
    }

    .project-card p {
      font-size: 14px;
      color: #ccc;
    }

    .project-card a {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 12px;
      background: #00bcd4;
      color: black;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
    }

    .project-card:hover {
      transform: translateY(-10px);
    }
  </style>
</head>

<body>

<!-- NAVIGATION -->
<nav>
  <a href="index.html">Accueil</a>
  <a href="about.html">À propos</a>
  <a href="formation.html">Formations</a>
  <a href="project.html">Projets</a>
  <a href="contact.html">Contact</a>
  <a href="login.html">Login</a>
</nav>

<h1>💼 Mes Projets</h1>

<div class="projects-container" id="projects"></div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

// 🔥 CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyDld_cVbQzQHjDdxHHkU9SjkvHSK8aEz_g",
  authDomain: "portefolioshimel.firebaseapp.com",
  projectId: "portefolioshimel",
  storageBucket: "portefolioshimel.appspot.com"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const container = document.getElementById("projects");

// 📥 Charger les projets
async function afficherProjets() {
  container.innerHTML = "<p>Chargement...</p>";

  const querySnapshot = await getDocs(collection(db, "project"));

  container.innerHTML = "";

  querySnapshot.forEach((doc) => {
    const data = doc.data();

    container.innerHTML += `
      <div class="project-card">
        <img src="${data.image}" alt="image projet">
        <h3>${data.titre}</h3>
        <p>${data.description}</p>
        <a href="${data.liens}" target="_blank">Voir projet</a>
      </div>
    `;
  });
}

// lancer
afficherProjets();

</script>

</body>
</html>
