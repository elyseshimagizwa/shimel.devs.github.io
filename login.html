<!DOCTYPE html>
<html>
<head>
  <title>elyse shimagizwa , createur digital</title>
  <style>
    body {
      background: #111;
      color: white;
      text-align: center;
      font-family: Arial;
      padding-top: 100px;
    }

    input {
      padding: 10px;
      margin: 10px;
      width: 250px;
    }

    button {
      padding: 10px;
      background: #00bcd4;
      border: none;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h2>🔐 Admin Login</h2>

<input type="email" id="email" placeholder="Email admin"><br>
<input type="password" id="password" placeholder="Mot de passe"><br>

<button onclick="login()">Se connecter</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDld_cVbQzQHjDdxHHkU9SjkvHSK8aEz_g",
  authDomain: "portefolioshimel.firebaseapp.com",
  projectId: "portefolioshimel"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = async function() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    await signInWithEmailAndPassword(auth, email, password);
    alert("Connexion réussie !");
    window.location.href = "admin.html";
  } catch (error) {
    alert("Erreur : " + error.message);
  }
};
</script>

</body>
</html>
