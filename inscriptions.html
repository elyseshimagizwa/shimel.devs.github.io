<h1>🎓 Inscription Formation</h1>

<form id="inscriptionForm">
  <input type="text" id="nom" placeholder="Votre nom" required>
  <input type="email" id="email" placeholder="Votre email" required>

  <select id="formation">
    <option>Développement Web</option>
    <option>Bureautique</option>
    <option>Réseaux / Systèmes</option>
  </select>

  <button type="submit">S'inscrire</button>
</form>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
import { getFirestore, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

// 🔥 REMPLACE PAR TON CODE
const firebaseConfig = {
  apiKey: "AIzaSyDld_cVbQzQHjDdxHHkU9SjkvHSK8aEz_g",
  authDomain: "portefolioshimel.firebaseapp.com",
  projectId: "portefolioshimel"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ENVOI INSCRIPTION
document.getElementById("inscriptionForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const nom = document.getElementById("nom").value;
  const email = document.getElementById("email").value;
  const formation = document.getElementById("formation").value;

  await addDoc(collection(db, "inscriptions"), {
    nom: nom,
    email: email,
    formation: formation,
    date: new Date()
  });

  alert("Inscription réussie !");
});
</script>

</body>
